```html
<!DOCTYPE html>
<html>
<head>
  <title>Mood Journal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 25px;
      background-color: #ffd6e7;
    }

    h1 {
      color: #a63d67;
    }

    .moodButton {
      padding: 10px 15px;
      margin: 6px;
      font-size: 16px;
      cursor: pointer;
      background-color: white;
      border: 2px solid #ff8fbd;
      border-radius: 12px;
    }

    .moodButton img {
      width: 35px;
      height: 35px;
      vertical-align: middle;
      margin-right: 6px;
    }

    textarea {
      width: 300px;
      height: 100px;
      padding: 10px;
      font-size: 15px;
      background-color: white;
      border: 2px solid #ff8fbd;
      border-radius: 10px;
    }

    #saveButton {
      padding: 10px 15px;
      margin: 5px;
      font-size: 15px;
      cursor: pointer;
      background-color: #ff8fbd;
      border: none;
      border-radius: 10px;
    }

    #message {
      font-weight: bold;
      color: #7a2c4c;
    }


    #quotePopup {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(90,30,55,0.35);
      align-items: center;
      justify-content: center;
    }


    .popupBox {
      position: relative;
      width: 310px;
      padding: 28px 24px;
      background-color: #fff8fc;
      border: 4px solid #ff8fbd;
      border-radius: 28px;
    }


    .popupTitle {
      color: #a63d67;
    }


    .popupBox img {
      width: 80px;
      height: 80px;
    }


    #popupQuote {
      font-size: 18px;
      color: #7a2c4c;
    }


    #closePopup {
      padding: 9px 18px;
      cursor: pointer;
      background-color: #ff8fbd;
      color: white;
      border: none;
      border-radius: 12px;
    }

  </style>

</head>


<body>


<h1>My Mood Journal</h1>


<p>How are you feeling today?</p>


<button class="moodButton" data-mood="happy">
<img src="./icons/happy.png">
Happy
</button>


<button class="moodButton" data-mood="calm">
<img src="./icons/calm.png">
Calm
</button>


<button class="moodButton" data-mood="sad">
<img src="./icons/sad.png">
Sad
</button>


<button class="moodButton" data-mood="stressed">
<img src="./icons/stressed.png">
Stressed
</button>



<p>Write a small note about your feelings:</p>


<textarea id="feelings" placeholder="Write here..."></textarea>


<br><br>


<button id="saveButton">
Save my mood
</button>


<p id="message"></p>



<div id="quotePopup">

<div class="popupBox">

<h2 class="popupTitle">
A little note for you
</h2>


<img id="popupImage">


<p id="popupQuote"></p>


<button id="closePopup">
Close
</button>


</div>

</div>



<script src="app.js"></script>


</body>
</html>
