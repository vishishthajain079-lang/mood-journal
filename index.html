<!DOCTYPE html>
<html>
<head>
  <title>Mood Journal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 25px;
      background-color: #ffd6e7;
    }

    h1 {
      color: #a63d67;
    }

    .moodButton {
      padding: 10px 15px;
      margin: 6px;
      font-size: 16px;
      cursor: pointer;
      background-color: white;
      border: 2px solid #ff8fbd;
      border-radius: 12px;
    }

    .moodButton img {
      width: 35px;
      height: 35px;
      vertical-align: middle;
      margin-right: 6px;
    }

    textarea {
      width: 300px;
      height: 100px;
      padding: 10px;
      font-size: 15px;
      background-color: white;
      border: 2px solid #ff8fbd;
      border-radius: 10px;
    }

    #saveButton,
    #quoteButton {
      padding: 10px 15px;
      margin: 5px;
      font-size: 15px;
      cursor: pointer;
      background-color: #ff8fbd;
      border: none;
      border-radius: 10px;
    }

    #message {
      font-weight: bold;
      color: #7a2c4c;
    }

    #quotePopup {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(90, 30, 55, 0.35);
      align-items: center;
      justify-content: center;
    }

    /* The big heart shape */
    .heart {
      position: relative;
      width: 260px;
      height: 235px;
      background-color: #ff8fbd;
      transform: rotate(-45deg);
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(100, 30, 60, 0.25);
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 235px;
      background-color: #ff8fbd;
      border-radius: 50%;
    }

    .heart::before {
      top: -130px;
      left: 0;
    }

    .heart::after {
      top: 0;
      left: 130px;
    }

    /* This keeps the quote straight inside the tilted heart */
    .heartContent {
      position: absolute;
      z-index: 2;
      width: 250px;
      top: 55px;
      left: 10px;
      transform: rotate(45deg);
      text-align: center;
    }

    .heartContent img {
      width: 55px;
      height: 55px;
      object-fit: contain;
    }

    #popupQuote {
      margin: 8px 0;
      font-size: 16px;
      color: #7a2c4c;
      line-height: 1.35;
    }

    #closePopup {
      padding: 7px 14px;
      cursor: pointer;
      background-color: white;
      color: #7a2c4c;
      border: none;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <h1>My Mood Journal</h1>

  <p>How are you feeling today?</p>

  <button class="moodButton" data-mood="happy">
    <img src="./icons/happy.png" alt="Happy drawing">
    Happy
  </button>

  <button class="moodButton" data-mood="calm">
    <img src="./icons/calm.png" alt="Calm drawing">
    Calm
  </button>

  <button class="moodButton" data-mood="sad">
    <img src="./icons/sad.png" alt="Sad drawing">
    Sad
  </button>

  <button class="moodButton" data-mood="stressed">
    <img src="./icons/stressed.png" alt="Stressed drawing">
    Stressed
  </button>

  <p>Write a small note about your feelings:</p>

  <textarea id="feelings" placeholder="Write here..."></textarea>

  <br><br>

  <button id="saveButton">Save my mood</button>
  <button id="quoteButton">Show my quote</button>

  <p id="message"></p>

  <div id="quotePopup">
    <div class="heart">
      <div class="heartContent">
        <img id="popupImage" src="" alt="Mood drawing">
        <p id="popupQuote"></p>
        <button id="closePopup">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
